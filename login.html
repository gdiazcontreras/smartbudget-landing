<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/main.css"/>
    <title>Login - SmartBudget</title>
  </head>

  <body>
    <!-- LOGIN CENTRADO -->
    <main class="login-container">
      <div class="login-card">
        <div class="login-brand text-center mb-4 d-block">
          <img src="./img/wallet-icon.png" width="40" height="40" alt="Logo SmartBudget" />

          <div class="mt-2">
            <span class="brand-primary">Smart</span><span class="brand-secondary">Budget</span>
          </div>
        </div>

        <h2 class="text-center mb-4">Iniciar sesión</h2>

        <form id="loginForm">
          <div class="mb-3">
            <label class="form-label">Usuario</label>

            <div class="input-group">
              <span class="input-group-text"> 👤 </span>

              <input
                type="email"
                class="form-control"
                id="usuario"
                placeholder="Ingresa tu usuario"
                required
              />
            </div>
          </div>

          <div class="mb-3">
            <label class="form-label">Contraseña</label>

            <div class="input-group">
              <span class="input-group-text"> 🔒 </span>

              <input
                type="password"
                class="form-control"
                id="password"
                placeholder="Ingresa tu contraseña"
                required
              />
            </div>
          </div>

          <div id="login-error" class="alert alert-danger d-none mt-3">
            ❌ Usuario o contraseña incorrectos
          </div>

          <!-- Botón modificado -->
          <button type="submit" class="btn-primary w-100">Ingresar</button>
        </form>

        <div class="text-center mt-3">
          <a href="index.html" class="link-alke"> ← Volver al inicio</a>
        </div>
      </div>
    </main>

    <script src="./js/jquery-4.0.0.min.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="./js/app.js"></script>
  </body>
</html>
