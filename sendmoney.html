<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./css/main.css">

    <title>Enviar dinero - SmartBudget</title>
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar navbar-expand-lg custom-navbar">
            <div class="container-fluid">

                <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                    <img src="./img/wallet-icon.png" width="30" height="30" alt="Logo SmartBudget">
                    <span class="brand-text">
                        <strong>Smart</strong>Budget
                    </span>
                </a>

                <span class="badge bg-success fs-6">
                    Saldo: $<span id="balanceText">0</span>
                </span>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarAlke">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarAlke">

                    <div class="navbar-nav ms-auto" id="nav-user">
                        <a class="nav-link" href="menu.html">Menú</a>
                        <a class="nav-link" href="deposit.html">Depósito</a>
                        <a class="nav-link active" href="sendmoney.html">Enviar</a>
                        <a class="nav-link" href="transactions.html">Movimientos</a>
                        <a class="nav-link text-danger" href="#" id="logout">Salir</a>
                    </div>

                </div>

            </div>
        </nav>
    </header>

    <!-- MAIN -->
    <main class="container py-5">

        <div class="send-card">

            <h2 class="text-center hero-title mb-2">
                Enviar dinero
            </h2>

            <p class="text-center text-muted mb-4">
                Completa los datos del destinatario y el monto a transferir.
            </p>

            <!-- FORM -->
            <form>

                <div class="row align-items-center g-4">

                    <!-- IMAGEN -->
                    <div class="col-md-5 text-center">
                        <img src="./img/sendmoney.png" class="img-fluid send-img" alt="Enviar dinero">
                    </div>

                    <!-- FORM COMPLETO -->
                    <div class="col-md-7">

                        <label class="form-label">Nombre destinatario</label>
                        <input type="text" class="form-control" id="destinatario" placeholder="Juan Pérez">

                        <label class="form-label mt-3">Número de cuenta</label>
                        <input type="text" class="form-control" id="cuenta" placeholder="Al menos 8 números">

                        <label class="form-label mt-3">Monto</label>
                        <input type="text" class="form-control" id="monto" inputmode="numeric" placeholder="$0" required>

                        <label class="form-label mt-3">Correo electrónico</label>
                        <input type="email" class="form-control" id="email" placeholder="usuario@email.com">

                    </div>

                </div>

                <!-- Botón modificado -->
                <button type="button" class="btn-primary w-100 mt-4" id="sendBtn">
                    ✈️ Realizar transferencia
                </button>

            </form>

        </div>

    </main>

    <!-- FOOTER -->
    <footer class="custom-footer">
        <div class="footer-brand d-flex align-items-center justify-content-center">
            <img src="./img/wallet-icon.png" alt="SmartBudget" />
            <span><strong>Smart</strong>Budget</span>
        </div>

        <p class="footer-text">
            Gestión inteligente de tus finanzas.
        </p>

        <small class="footer-copy">
            © 2026 Gabriela Díaz - SmartBudget. Todos los derechos reservados
        </small>
    </footer>

    <script src="./js/jquery-4.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/app.js"></script>

</body>

</html>
