<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="./css/deposit.css">

    <title>Depósito - Alke Wallet</title>
</head>

<body>

    <!-- NAVBAR -->
    <header>
        <nav class="navbar navbar-expand-lg custom-navbar">
            <div class="container-fluid">

                <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                    <img src="./img/wallet-icon.png" width="30" height="30">
                    <span class="brand-text">
                        <strong>Alke</strong> Wallet
                    </span>
                </a>

                <span class="badge bg-success fs-6">
                    Saldo: $<span id="balanceText">0</span>
                </span>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarAlke">
                    <span class="navbar-toggler-icon"></span>
                </button>

                <div class="collapse navbar-collapse" id="navbarAlke">

                    <div class="navbar-nav ms-auto" id="nav-user">
                        <a class="nav-link" href="menu.html">Menú</a>
                        <a class="nav-link active" href="deposit.html">Depósito</a>
                        <a class="nav-link" href="sendmoney.html">Enviar</a>
                        <a class="nav-link" href="transactions.html">Movimientos</a>
                        <a class="nav-link text-danger" href="#" id="logout">Salir</a>
                    </div>

                </div>

            </div>
        </nav>
    </header>

    <!-- MAIN -->
    <main class="container py-5">

        <div class="deposit-card">

            <div class="row align-items-center">

                <!-- IZQUIERDA (ILUSTRACIÓN) -->
                <div class="col-md-5 text-center">
                    <img src="./img/piggybank.png" alt="Depósito" class="img-fluid deposit-img">
                </div>

                <!-- DERECHA (FORMULARIO) -->
                <div class="col-md-7">

                    <h2 class="hero-title mb-2">
                        Depósito
                    </h2>

                    <p class="text-muted mb-4">
                        Agrega dinero a tu cuenta de forma rápida y segura
                    </p>

                    <!-- FORM -->
                    <form>

                        <div class="row g-3">

                            <div class="col-md-6">
                                <label class="form-label">Monto</label>
                                <input type="text" class="form-control" id="depositMonto" placeholder="$ 0">
                            </div>

                            <div class="col-md-6">
                                <label class="form-label">Tipo de depósito</label>
                                <select class="form-select">
                                    <option>Selecciona una opción</option>
                                    <option>Transferencia</option>
                                    <option>Efectivo</option>
                                    <option>Depósito bancario</option>
                                </select>
                            </div>

                        </div>

                        <button type="button" class="btn hero-btn w-100 mt-4" id="depositBtn">
                            🧾 Realizar depósito
                        </button>

                    </form>

                </div>

            </div>

        </div>

    </main>

    <!-- FOOTER -->
    <footer class="custom-footer">
        <div class="footer-brand d-flex align-items-center justify-content-center">
            <img src="./img/wallet-icon.png" alt="Alke Wallet" />
            <span><strong>Alke</strong> Wallet</span>
        </div>

        <p class="footer-text">
            Gestión segura de tus finanzas digitales
        </p>

        <small class="footer-copy">
            © 2026 Gabriela Díaz - Alke Wallet. Todos los derechos reservados
        </small>
    </footer>

    <script src="./js/jquery-4.0.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="./js/app.js"></script>

</body>

</html>
